name: nexus_app
description: "A real-time chat messenger app built with Flutter and Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  #firebase_messaging: ^15.0.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.2

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Utils
  timeago: ^3.6.1
  uuid: ^4.4.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true